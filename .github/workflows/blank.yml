name: github-test
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: build
        run: |
          echo "build is not ${{ vars.START }}    ${{ secrets.NAME }}"
          echo "build is not ${{ vars.COMPLETE }}"
  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: test
        run: |
          echo "test is  ${{vars.START }}"
          echo "test is ${{ vars.COMPLETE }}"

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: deploy
        run: |
          echo "deploy is started"
          echo "deploy is completed"
       
