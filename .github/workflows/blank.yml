name: test
on: workflow_dispatch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Debug Secret Securely (SHA-256 Hash)
        run: |
          # This outputs a one-way hash. You can compare this hash to your local secret's hash.
          echo -n "$AWS_SECRET_ACCESS_KEY" | sha256sum
        env:
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
